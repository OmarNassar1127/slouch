<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    
    <title>Slouch — AI Posture Correction in Your Browser</title>
    <meta name="description" content="Fix your posture with just your webcam. AI-powered posture correction that runs entirely in your browser. No hardware needed." />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Slouch — AI Posture Correction in Your Browser" />
    <meta property="og:description" content="Fix your posture with just your webcam. No hardware needed. AI-powered and 100% private." />
    <meta property="og:url" content="https://slouch.pro" />
    <meta property="og:image" content="https://slouch.pro/og-image.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@omarnassar" />
    <meta name="twitter:title" content="Slouch — AI Posture Correction in Your Browser" />
    <meta name="twitter:description" content="Fix your posture with just your webcam. No hardware needed. AI-powered and 100% private." />
    <meta name="twitter:image" content="https://slouch.pro/og-image.png" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://slouch.pro" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
    <script>
      // Handle SPA redirect from 404.html (GitHub Pages)
      (function() {
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        if (redirect) {
          history.replaceState(null, '', decodeURIComponent(redirect));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
