<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Slouch</title>
    <script>
      // Single Page App routing fix for GitHub Pages
      const segment = '/slouch'; // Change to '' when using custom domain
      const path = window.location.pathname.replace(segment, '') + window.location.search + window.location.hash;
      window.location.replace(segment + '/?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
